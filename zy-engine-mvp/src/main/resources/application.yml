server:
  port: 18080
  servlet:
    context-path: /zy-engine
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: zy-engine-mvp

zyengine:
  database:
    dialect: oracle
    enabled: ${ZYENGINE_DB_ENABLED:false}
    url: ${ZYENGINE_DB_URL:jdbc:oracle:thin:@//192.168.4.25:1521/ORCL}
    username: ${ZYENGINE_DB_USERNAME:ZYENGINE}
    password: ${ZYENGINE_DB_PASSWORD:}
    init-schema: ${ZYENGINE_DB_INIT_SCHEMA:true}
  dify:
    enabled: ${ZYENGINE_DIFY_ENABLED:false}
    base-url: ${ZYENGINE_DIFY_BASE_URL:}
    api-key: ${ZYENGINE_DIFY_API_KEY:}
    timeout-ms: ${ZYENGINE_DIFY_TIMEOUT_MS:3000}
    user: ${ZYENGINE_DIFY_USER:zy-engine-mvp}
  graph:
    enabled: ${ZYENGINE_GRAPH_ENABLED:false}
    uri: ${ZYENGINE_GRAPH_URI:bolt://localhost:7687}
    username: ${ZYENGINE_GRAPH_USERNAME:neo4j}
    password: ${ZYENGINE_GRAPH_PASSWORD:}
    database: ${ZYENGINE_GRAPH_DATABASE:neo4j}
    timeout-ms: ${ZYENGINE_GRAPH_TIMEOUT_MS:3000}
    default-version: ${ZYENGINE_GRAPH_DEFAULT_VERSION:AMI_GRAPH_2026_01}
