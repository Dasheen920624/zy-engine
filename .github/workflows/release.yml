# GA-OPS-04 · Release CI（tag-driven）
#
# 触发：推 v1.* tag（如 v1.0.0-rc1 / v1.0.0）
# 产物：
#   - JAR（fat jar，spring-boot-maven-plugin 重打包）
#   - CycloneDX SBOM（json + xml）
#   - SHA-256 checksum
#   - cosign keyless signing（OIDC，无需私钥）
#   - GitHub Release attach 全部 artifact
#
# 用于：
#   - 离线安装包构建上游（GA-OPS-05）
#   - 等保 / 商密评测的"软件供应链证据"
#   - 客户验收时的"出厂可验证签名"

name: MedKernel Release

on:
  push:
    tags:
      - "v1.*"

permissions:
  contents: write
  id-token: write      # cosign keyless 需要 OIDC token
  attestations: write

jobs:
  release:
    name: release ${{ github.ref_name }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build + SBOM
        working-directory: medkernel-backend
        run: mvn -B package -DskipTests

      - name: Locate artifacts
        id: locate
        run: |
          JAR=$(ls medkernel-backend/target/medkernel-backend-*.jar | grep -v sources | head -1)
          SBOM=medkernel-backend/target/bom.json
          echo "jar=$JAR" >> $GITHUB_OUTPUT
          echo "sbom=$SBOM" >> $GITHUB_OUTPUT
          sha256sum "$JAR" > "$JAR.sha256"
          sha256sum "$SBOM" > "$SBOM.sha256"

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: "v2.4.0"

      - name: Sign JAR with cosign (keyless OIDC)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign-blob \
            --yes \
            --output-signature ${{ steps.locate.outputs.jar }}.sig \
            --output-certificate ${{ steps.locate.outputs.jar }}.crt \
            ${{ steps.locate.outputs.jar }}

      - name: Sign SBOM with cosign
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign-blob \
            --yes \
            --output-signature ${{ steps.locate.outputs.sbom }}.sig \
            --output-certificate ${{ steps.locate.outputs.sbom }}.crt \
            ${{ steps.locate.outputs.sbom }}

      - name: Generate SLSA attestation
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: ${{ steps.locate.outputs.jar }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "MedKernel ${{ github.ref_name }}"
          generate_release_notes: true
          files: |
            ${{ steps.locate.outputs.jar }}
            ${{ steps.locate.outputs.jar }}.sha256
            ${{ steps.locate.outputs.jar }}.sig
            ${{ steps.locate.outputs.jar }}.crt
            ${{ steps.locate.outputs.sbom }}
            ${{ steps.locate.outputs.sbom }}.sha256
            ${{ steps.locate.outputs.sbom }}.sig
            ${{ steps.locate.outputs.sbom }}.crt
