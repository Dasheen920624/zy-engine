name: MedKernel CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # 必需 check #1（分支保护规则匹配）
  backend-build-test:
    name: backend-build-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Show versions
        run: |
          java -version
          mvn -version

      - name: Compile backend (medkernel-backend)
        working-directory: medkernel-backend
        run: mvn -B -q -DskipTests compile

      - name: Run unit tests (skeleton smoke)
        working-directory: medkernel-backend
        run: mvn -B -q test

  # 必需 check #2（分支保护规则匹配）
  guard-rules:
    name: guard-rules
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enforce trunk-based PR rule
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            BASE="${GITHUB_BASE_REF}"
            HEAD="${GITHUB_HEAD_REF}"
            echo "PR: ${HEAD} -> ${BASE}"
            if [ "${BASE}" != "main" ]; then
              echo "::error::v1.0 GA trunk-based: PR base 必须是 main（当前 base=${BASE}）"
              exit 1
            fi
          fi

      - name: Verify CONSTITUTION + backlog exist
        run: |
          test -f docs/CONSTITUTION.md || { echo "::error::缺 docs/CONSTITUTION.md"; exit 1; }
          test -f docs/V1_GA_REWRITE_PLAN.md || { echo "::error::缺 docs/V1_GA_REWRITE_PLAN.md"; exit 1; }
          test -f docs/backlog.md || { echo "::error::缺 docs/backlog.md"; exit 1; }
          echo "✓ 3 张权威文档齐备"

      - name: Forbid legacy task naming in new code
        run: |
          # 仅在新代码区域（非 archive）禁止旧命名
          if git ls-files medkernel-backend frontend/src docs/CONSTITUTION.md docs/V1_GA_REWRITE_PLAN.md docs/backlog.md 2>/dev/null \
             | xargs grep -l "PR-V2-\|PR-V3-\|PR-FINAL-\|DOC-V2-" 2>/dev/null; then
            echo "::error::新代码区不允许引用 PR-V2-/PR-V3-/PR-FINAL-/DOC-V2- 旧任务命名"
            exit 1
          fi
          echo "✓ 新代码区无旧任务命名残留"

  # 前端骨架编译检查
  frontend-build-test:
    name: frontend-build-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install (no lockfile yet, will be regenerated)
        working-directory: frontend
        run: npm install --no-audit --no-fund --no-package-lock

      - name: Type check
        working-directory: frontend
        run: npm run typecheck
