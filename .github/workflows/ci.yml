name: MedKernel CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # 必需 check #1（分支保护规则匹配）
  backend-build-test:
    name: backend-build-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Show versions
        run: |
          java -version
          mvn -version

      - name: Compile backend (medkernel-backend)
        working-directory: medkernel-backend
        run: mvn -B -q -DskipTests compile

      - name: Run unit tests
        working-directory: medkernel-backend
        run: mvn -B -q test

      - name: Generate JaCoCo coverage report
        working-directory: medkernel-backend
        run: mvn -B -q jacoco:report

      - name: Build + SBOM
        working-directory: medkernel-backend
        run: mvn -B -q package -DskipTests

      - name: Upload SBOM artifact (CycloneDX)
        uses: actions/upload-artifact@v4
        with:
          name: medkernel-backend-sbom-${{ github.sha }}
          path: medkernel-backend/target/bom.json
          if-no-files-found: warn

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: medkernel-backend-coverage-${{ github.sha }}
          path: medkernel-backend/target/site/jacoco/
          if-no-files-found: warn

  # 必需 check #2（分支保护规则匹配）
  guard-rules:
    name: guard-rules
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enforce trunk-based PR rule
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            BASE="${GITHUB_BASE_REF}"
            HEAD="${GITHUB_HEAD_REF}"
            echo "PR: ${HEAD} -> ${BASE}"
            if [ "${BASE}" != "main" ]; then
              echo "::error::v1.0 GA trunk-based: PR base 必须是 main（当前 base=${BASE}）"
              exit 1
            fi
          fi

      - name: Verify CONSTITUTION + backlog exist
        run: |
          test -f docs/CONSTITUTION.md || { echo "::error::缺 docs/CONSTITUTION.md"; exit 1; }
          test -f docs/MEDKERNEL_FOUNDATION_AND_SERVICES.md || { echo "::error::缺 docs/MEDKERNEL_FOUNDATION_AND_SERVICES.md"; exit 1; }
          test -f docs/MEDKERNEL_PRODUCT_EXPERIENCE_RULES.md || { echo "::error::缺 docs/MEDKERNEL_PRODUCT_EXPERIENCE_RULES.md"; exit 1; }
          test -f docs/MEDKERNEL_IMPLEMENTATION_LANDING_PLAN.md || { echo "::error::缺 docs/MEDKERNEL_IMPLEMENTATION_LANDING_PLAN.md"; exit 1; }
          test -f docs/MEDKERNEL_BUSINESS_SCENARIO_DETAIL_SPEC.md || { echo "::error::缺 docs/MEDKERNEL_BUSINESS_SCENARIO_DETAIL_SPEC.md"; exit 1; }
          test -f docs/backlog.md || { echo "::error::缺 docs/backlog.md"; exit 1; }
          echo "✓ 6 张权威文档齐备"

      - name: Forbid legacy task naming in code
        run: |
          files=$(git ls-files medkernel-backend frontend/src 2>/dev/null)
          if [ -n "$files" ] && echo "$files" | xargs grep -lE "PR-V[23]-[A-Z]+|PR-FINAL-[0-9]+|DOC-V2-[A-Z]+" 2>/dev/null; then
            echo "::error::代码区不允许引用重启前旧任务命名"
            exit 1
          fi
          echo "✓ 代码区无旧任务命名残留"

      - name: Set up Node 20 for authenticity guard
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch main for touched-file guard
        run: git fetch origin main

      - name: Test authenticity guard
        run: node --test scripts/authenticity-guard.test.mjs

      - name: Block new touched-file authenticity debt
        run: node scripts/authenticity-guard.mjs --mode=changed --base=origin/main

      - name: Print authenticity debt inventory
        if: always()
        run: node scripts/authenticity-guard.mjs --mode=inventory

  # 前端骨架编译检查
  frontend-build-test:
    name: frontend-build-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install
        working-directory: frontend
        run: npm install --no-audit --no-fund --no-package-lock

      - name: Type check
        working-directory: frontend
        run: npm run typecheck

      - name: Unit tests with coverage
        working-directory: frontend
        run: npm run test:coverage

      - name: Upload frontend coverage
        uses: actions/upload-artifact@v4
        with:
          name: medkernel-frontend-coverage-${{ github.sha }}
          path: frontend/coverage/
          if-no-files-found: warn

  # GA-ENG-BASE-09 · 前端 ESLint 门禁（视觉债 / mock / 旧命名归零的硬门禁）
  frontend-lint:
    name: frontend-lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install
        working-directory: frontend
        run: npm install --no-audit --no-fund --no-package-lock

      - name: ESLint
        working-directory: frontend
        run: npm run lint

      - name: Prettier format check
        working-directory: frontend
        run: npm run format:check

  # GA-OPS-03 · 国产化 JDK 矩阵（多发行版兼容性 smoke）
  # 选用 Temurin / Zulu / Dragonwell 三个 GA 阶段必须验证的 OpenJDK 21 发行版。
  # KAE-JDK / LoongJDK 等纯国产发行版没有公开 GitHub Action distribution，
  # 由 GA-PILOT-* 阶段在客户内网 self-hosted runner 上自检。
  jdk-matrix-smoke:
    name: jdk-matrix-smoke (${{ matrix.distribution }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # GA-OPS-03 国产化 JDK 矩阵候选：
        # - temurin: Eclipse Adoptium（事实标准）
        # - zulu: Azul Zulu（金融 + 医疗常见选型）
        # - corretto: Amazon Corretto（AWS 默认 + LTS 长期支持）
        # KAE-JDK / LoongJDK / Dragonwell 等纯国产 distribution
        # 由 GA-PILOT-* 阶段客户内网 self-hosted runner 单独补
        distribution: [temurin, zulu, corretto]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21 (${{ matrix.distribution }})
        uses: actions/setup-java@v4
        with:
          distribution: ${{ matrix.distribution }}
          java-version: "21"

      - name: Smoke compile
        working-directory: medkernel-backend
        run: mvn -B -q -DskipTests compile

      - name: Smoke test
        working-directory: medkernel-backend
        run: mvn -B -q test

  # GA-ENG-DOC-01 · 引擎层中文 Javadoc / SQL COMMENT 软门禁
  # 设计文档：docs/superpowers/specs/2026-05-27-engine-comment-language-design.md
  # 新增 .java / .sql 文件缺中文注释 → fail；修改既有文件缺口 → 仅 step summary warn。
  comment-language-check:
    name: comment-language-check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 需要完整历史以便 git merge-base origin/main

      - name: Run self-test
        run: scripts/check-comment-zh.sh --self-test

      - name: Run diff check (new files fail, modified files warn)
        run: scripts/check-comment-zh.sh

      - name: Print full coverage summary
        if: always()
        run: scripts/check-comment-zh.sh --mode=full
