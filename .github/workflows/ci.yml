name: MedKernel CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  backend-build-test:
    name: backend-build-test
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'

      - name: Show Java version
        run: java -version

      - name: Verify encoding and JSON samples
        run: .\medkernel-mvp\scripts\verify-encoding.cmd

      # 显式独立 mvn compile，便于在 CI 日志里立刻看到"编译失败"vs"测试失败"vs"打包失败"。
      # 这一步对应 ai-dev-input/00_DEVELOP_HEALTH.md 的 GREEN/RED 判定。
      - name: Compile only (gates DEVELOP_HEALTH)
        run: mvn -q -f medkernel-mvp\pom.xml compile

      - name: Build backend MVP
        run: .\medkernel-mvp\scripts\build.cmd

      - name: Run JUnit contract tests
        run: .\medkernel-mvp\scripts\run-tests.cmd

  guard-rules:
    name: guard-rules
    runs-on: windows-latest

    steps:
      - name: Checkout (full history for git diff)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare diff base
        shell: pwsh
        env:
          EVENT_BEFORE: ${{ github.event.before }}
        run: |
          if ($env:GITHUB_EVENT_NAME -eq "pull_request" -and $env:GITHUB_BASE_REF) {
            git fetch --no-tags origin "+refs/heads/$env:GITHUB_BASE_REF:refs/remotes/origin/$env:GITHUB_BASE_REF"
            git rev-parse "origin/$env:GITHUB_BASE_REF"
          } elseif ($env:GITHUB_EVENT_NAME -eq "push" -and $env:EVENT_BEFORE -and $env:EVENT_BEFORE -notmatch '^0{40}$') {
            git rev-parse $env:EVENT_BEFORE
          }

      - name: Enforce branch policy
        if: github.event_name == 'pull_request'
        shell: pwsh
        run: |
          $base = $env:GITHUB_BASE_REF
          $head = $env:GITHUB_HEAD_REF
          Write-Host "PR branch policy: $head -> $base"

          if ($base -eq "main" -and $head -ne "develop") {
            throw "AI 变更不允许直接 PR 到 main；必须先合入 develop，再由用户发起 develop -> main 发布 PR。"
          }

          if ($base -eq "develop" -and $head -eq "main") {
            throw "不允许从 main 合回 develop；AI 任务必须基于 develop。"
          }

      - name: Run verify-pr.ps1 (skip backend/frontend build, only guard rules)
        shell: pwsh
        env:
          EVENT_BEFORE: ${{ github.event.before }}
        run: |
          if ($env:GITHUB_EVENT_NAME -eq "push" -and $env:EVENT_BEFORE -and $env:EVENT_BEFORE -notmatch '^0{40}$') {
            $env:MEDKERNEL_DIFF_BASE = $env:EVENT_BEFORE
            Write-Host "Push diff base = $env:MEDKERNEL_DIFF_BASE"
          }
          $head = $env:GITHUB_HEAD_REF
          if ($head -match '^ai/([A-Za-z0-9-]+)/') {
            $taskId = $matches[1]
          } elseif ($head -match '^feature/([A-Za-z0-9-]+)/') {
            $taskId = $matches[1]
          } else {
            $taskId = "CI-PR-$($env:GITHUB_RUN_ID)"
          }
          Write-Host "Resolved TaskId = $taskId"
          .\scripts\verify-pr.ps1 -TaskId $taskId -SkipFrontend -SkipBackend

  # GA-GOV-01: 并发机制硬门禁 — orphan lock、重复 task、write_scope 重叠均自动阻断
  ai-collaboration-guard:
    name: ai-collaboration-guard
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check AI collaboration integrity
        shell: pwsh
        run: |
          Write-Host "=== AI Collaboration Guard (GA-GOV-01) ===" -ForegroundColor Cyan
          Write-Host ""

          $script = ".\medkernel-mvp\scripts\check-ai-collaboration.ps1"
          if (-not (Test-Path $script)) {
            throw "check-ai-collaboration.ps1 not found at $script"
          }

          # 严格模式：orphan lock / 重复 task / write_scope 重叠均阻断
          & $script -Strict 2>&1
          if ($LASTEXITCODE -ne 0) {
            Write-Host ""
            Write-Host "[BLOCKED] AI 协作门禁未通过 — 存在 orphan lock、重复 task 或 write_scope 重叠" -ForegroundColor Red
            Write-Host "请先清理 ai-dev-input/10_task_claims/ 下的冲突项后再提交" -ForegroundColor Red
            exit 1
          }

          Write-Host ""
          Write-Host "[PASS] AI 协作门禁通过 — 无 orphan lock、无重复 task、无 write_scope 重叠" -ForegroundColor Green
