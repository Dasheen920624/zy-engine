name: ZY Engine CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build and verify
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'

      - name: Show Java version
        run: java -version

      - name: Verify encoding and JSON samples
        run: .\zy-engine-mvp\scripts\verify-encoding.cmd

      - name: Build backend MVP
        run: .\zy-engine-mvp\scripts\build.cmd

      - name: Run JUnit contract tests
        run: .\zy-engine-mvp\scripts\run-tests.cmd
