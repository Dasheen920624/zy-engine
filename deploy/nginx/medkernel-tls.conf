# ZY Engine 反向代理（HTTPS 版）
# 适用医院内网 + 自签证书或医院 CA。
#
# 准备：
#   /etc/nginx/ssl/medkernel.crt
#   /etc/nginx/ssl/medkernel.key
#   （或医院 CA 颁发的证书链）
#
# 自签生成：
#   openssl req -x509 -nodes -days 3650 -newkey rsa:4096 \
#     -keyout /etc/nginx/ssl/medkernel.key \
#     -out    /etc/nginx/ssl/medkernel.crt \
#     -subj "/C=CN/ST=Beijing/L=Beijing/O=Hospital/OU=IT/CN=medkernel.hospital.local"

upstream medkernel_backend {
    server 127.0.0.1:18080 max_fails=3 fail_timeout=10s;
    keepalive 32;
}

limit_req_zone $binary_remote_addr zone=medkernel_api_tls:10m rate=100r/s;

# HTTP → HTTPS
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/medkernel.crt;
    ssl_certificate_key /etc/nginx/ssl/medkernel.key;

    # 协议与套件（国密支持需 OpenSSL + Nginx 编译国密版；本配置走标准 TLS）
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5:!RC4:!DSS:!3DES;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    charset utf-8;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 16M;

    access_log /var/log/nginx/medkernel.access.log combined;
    error_log  /var/log/nginx/medkernel.error.log warn;

    root /zoesoft/medkernel/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        expires 1h;
    }

    location /assets/ {
        expires 365d;
        add_header Cache-Control "public, immutable, max-age=31536000";
    }

    location /medkernel/ {
        limit_req zone=medkernel_api_tls burst=200 nodelay;

        proxy_pass http://medkernel_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header X-Trace-Id $http_x_trace_id;
        proxy_pass_header X-Trace-Id;

        proxy_set_header X-Tenant-Id      $http_x_tenant_id;
        proxy_set_header X-Group-Code     $http_x_group_code;
        proxy_set_header X-Hospital-Code  $http_x_hospital_code;
        proxy_set_header X-Campus-Code    $http_x_campus_code;
        proxy_set_header X-Site-Code      $http_x_site_code;
        proxy_set_header X-Department-Code $http_x_department_code;

        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    location = /healthz {
        access_log off;
        proxy_pass http://medkernel_backend/medkernel/api/health;
    }
}
