# ZY Engine 反向代理（HTTP 版，内网用）
# 部署到：/etc/nginx/conf.d/zy-engine.conf
# 测试：sudo nginx -t && sudo systemctl reload nginx
#
# 若用 HTTPS，请参考 zy-engine-tls.conf。

upstream zyengine_backend {
    server 127.0.0.1:18080 max_fails=3 fail_timeout=10s;
    keepalive 32;
}

# 限速：单 IP 每秒 100 请求（按客户负载调整）
limit_req_zone $binary_remote_addr zone=zyengine_api:10m rate=100r/s;

server {
    listen 80;
    server_name _;     # 替换为实际域名或保持 _

    # 字符集
    charset utf-8;

    # 安全头
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    client_max_body_size 16M;

    # 访问与错误日志
    access_log /var/log/nginx/zyengine.access.log combined;
    error_log  /var/log/nginx/zyengine.error.log warn;

    # 前端静态资源（vite build 产物）
    root /zoesoft/zy-engine/frontend/dist;
    index index.html;

    # SPA fallback：路由由前端处理
    location / {
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # 前端静态文件长缓存
    location /assets/ {
        expires 365d;
        add_header Cache-Control "public, immutable, max-age=31536000";
    }

    # 后端 API 反代
    location /zy-engine/ {
        limit_req zone=zyengine_api burst=200 nodelay;

        proxy_pass http://zyengine_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 透传 traceId
        proxy_set_header X-Trace-Id $http_x_trace_id;
        proxy_pass_header X-Trace-Id;

        # 透传组织上下文 Header
        proxy_set_header X-Tenant-Id      $http_x_tenant_id;
        proxy_set_header X-Group-Code     $http_x_group_code;
        proxy_set_header X-Hospital-Code  $http_x_hospital_code;
        proxy_set_header X-Campus-Code    $http_x_campus_code;
        proxy_set_header X-Site-Code      $http_x_site_code;
        proxy_set_header X-Department-Code $http_x_department_code;

        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # actuator 端点限制（仅 SRE 网段；如不暴露，注释整段并 deny）
        # location /zy-engine/actuator/ { allow 10.0.0.0/8; deny all; proxy_pass http://zyengine_backend; }
    }

    # 健康检查（外部可探测）
    location = /healthz {
        access_log off;
        proxy_pass http://zyengine_backend/zy-engine/api/health;
    }
}
