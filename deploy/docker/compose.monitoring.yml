services:
  prometheus:
    image: prom/prometheus:v2.55.1
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
    ports:
      - "${MEDKERNEL_PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../monitoring/prometheus/medkernel-alert-rules.yml:/etc/prometheus/rules/medkernel-alert-rules.yml:ro
      - ${MEDKERNEL_RUNTIME_ROOT:?set MEDKERNEL_RUNTIME_ROOT}/data/prometheus:/prometheus
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - medkernel

  grafana:
    image: grafana/grafana:11.2.2
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${MEDKERNEL_GRAFANA_ADMIN_PASSWORD:?set MEDKERNEL_GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "${MEDKERNEL_GRAFANA_PORT:-3000}:3000"
    volumes:
      - ${MEDKERNEL_RUNTIME_ROOT:?set MEDKERNEL_RUNTIME_ROOT}/data/grafana:/var/lib/grafana
      - ../monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../monitoring/grafana/dashboards:/opt/medkernel/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - medkernel
