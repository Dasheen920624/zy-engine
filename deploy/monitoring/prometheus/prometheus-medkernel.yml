global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    product: medkernel
    environment: pilot

rule_files:
  - medkernel-alert-rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: medkernel-backend
    scrape_interval: 15s
    scrape_timeout: 5s
    metrics_path: /medkernel/actuator/prometheus
    scheme: http
    static_configs:
      - targets:
          # Docker 部署时使用 host.docker.internal 访问宿主机
          - host.docker.internal:18081
        labels:
          service: medkernel-mvp
          role: backend
