global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    product: medkernel
    environment: pilot

rule_files:
  - medkernel-alert-rules.yml

scrape_configs:
  - job_name: medkernel-backend
    scrape_interval: 15s
    scrape_timeout: 5s
    metrics_path: /medkernel/actuator/prometheus
    scheme: http
    static_configs:
      - targets:
          - 127.0.0.1:18081
        labels:
          service: medkernel-mvp
          role: backend
