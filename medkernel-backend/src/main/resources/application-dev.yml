# dev profile — 本地开发，H2 内存库
spring:
  datasource:
    url: jdbc:h2:mem:medkernel;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  h2:
    console:
      enabled: true
  flyway:
    enabled: false      # GA-CORE-03 实装时切 true，并加载 db/migration/h2/V*.sql

security:
  bypass: true          # 仅 dev 跳过鉴权；prod 必须 false
