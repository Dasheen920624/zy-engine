# dev profile — 本地开发，H2 内存库
spring:
  datasource:
    url: jdbc:h2:mem:medkernel;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  h2:
    console:
      enabled: true
  flyway:
    enabled: true
    locations: classpath:db/migration/h2

management:
  health:
    neo4j:
      enabled: false    # 本地最小环境不强依赖 Neo4j 查询投影

security:
  bypass: true          # 仅 dev 跳过鉴权；prod 必须 false
