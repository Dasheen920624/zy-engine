# test profile — 本地/CI 默认使用 H2；Docker 方言矩阵由 @Tag("docker") smoke 覆盖
spring:
  datasource:
    url: jdbc:h2:mem:medkernel_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  flyway:
    enabled: true
    locations: classpath:db/migration/h2

management:
  health:
    neo4j:
      enabled: false
