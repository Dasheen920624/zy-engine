# MedKernel v1.0 GA · 默认 application.yml
# 详细 profile 详见 application-{dev,test,demo,prod,govcloud}.yml
spring:
  application:
    name: medkernel
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  main:
    banner-mode: console
  threads:
    virtual:
      enabled: true     # Spring Boot 3.2+ Virtual Threads 默认开启
  flyway:
    enabled: false      # Phase-1 骨架不连真 DB；GA-CORE-03 实装时切 true

server:
  port: ${SERVER_PORT:18080}
  servlet:
    context-path: /medkernel
  tomcat:
    threads:
      max: 200
  compression:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
  prometheus:
    metrics:
      export:
        enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    root: INFO
    com.medkernel: DEBUG
