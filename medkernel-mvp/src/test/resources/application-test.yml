# 测试 profile（@ActiveProfiles("test") 激活）。
# 仅供 src/test 中的 @SpringBootTest / MockMvc 用例加载，
# 主 application.yml 已移除 JWT 默认密钥（AUDIT §5.1）。
#
# 警告：本文件中的 jwt-secret 长度 >= 32，但仍是公开测试值，
# 严禁复制到 application-*.yml 或任何真实部署环境。

spring:
  # PR-FINAL-25: 测试 profile 强制 Flyway 启用（避免 ${medkernel.database.enabled} 占位符
  # 在 FlywayAutoConfiguration 早期实例化时未完成 binding 导致 migrate 跳过）
  flyway:
    enabled: true

medkernel:
  database:
    role: development
    enabled: true
    dialect: h2
    url: jdbc:h2:mem:medkernel_contract_test;MODE=Oracle;DATABASE_TO_UPPER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password: ""
  security:
    jwt-secret: test-only-jwt-secret-do-not-use-in-production-medkernel-2026
  dify:
    enabled: false
  graph:
    enabled: false
