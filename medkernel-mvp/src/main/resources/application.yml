server:
  port: 18080
  servlet:
    context-path: /medkernel
    encoding:
      charset: UTF-8
      enabled: true
      force: true

# PR-FINAL-24: Actuator + Prometheus 端点配置
# - management.server.port=18081 与业务端口 18080 分离（运维只暴露 18080 给外网）
# - actuator base-path: /medkernel/actuator/{health,info,metrics,prometheus}
# - 仅 when_authorized 时返回 health details，避免泄露内部连接信息
management:
  server:
    port: ${MEDKERNEL_MANAGEMENT_PORT:18081}
    address: ${MEDKERNEL_MANAGEMENT_ADDRESS:127.0.0.1}
  endpoints:
    web:
      base-path: ${MEDKERNEL_MANAGEMENT_BASE_PATH:/medkernel/actuator}
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: ${MEDKERNEL_MANAGEMENT_HEALTH_DETAILS:when_authorized}
    prometheus:
      enabled: true
  health:
    neo4j:
      enabled: ${MEDKERNEL_MANAGEMENT_NEO4J_HEALTH_ENABLED:false}
  info:
    env:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
      service: medkernel

info:
  app:
    name: medkernel-mvp
    version: 0.1.0-SNAPSHOT

spring:
  application:
    name: medkernel-mvp
  jackson:
    property-naming-strategy: SNAKE_CASE
    default-property-inclusion: NON_NULL
    serialization:
      write-dates-as-timestamps: false
  # PR-FINAL-25: Flyway 零 baseline 设计 —— 项目未上线，Flyway 接管全部 schema 管理。
  # - enabled 跟 medkernel.database.enabled 联动（用 Spring 占位符读配置项，不是环境变量；
  #   测试 profile（application-test.yml）设了 medkernel.database.enabled=true，自动启用 Flyway）
  # - locations 按方言切目录：dialect=oracle → db/migration/oracle/V*.sql；默认 h2
  # - table=medkernel_schema_history 避免污染共享 schema 命名空间
  # - baseline-on-migrate=false 因为没有"历史"baseline 需要承认（项目未上线）
  # - validate-on-migrate=true 防止 V*.sql checksum 被改后无声漂移
  # 详见 docs/adr/0014-flyway-zero-baseline.md
  flyway:
    # 默认开 —— 零 baseline 设计下 Flyway 是 schema 管理唯一权威；
    # 如医院手动管理 schema，可设 MEDKERNEL_FLYWAY_ENABLED=false 跳过
    enabled: ${MEDKERNEL_FLYWAY_ENABLED:true}
    locations: classpath:db/migration/${medkernel.database.dialect:h2}
    table: ${MEDKERNEL_FLYWAY_TABLE:medkernel_schema_history}
    baseline-on-migrate: false
    validate-on-migrate: true
    out-of-order: false

medkernel:
  database:
    dialect: oracle
    role: ${MEDKERNEL_DB_ROLE:production}
    enabled: ${MEDKERNEL_DB_ENABLED:false}
    url: ${MEDKERNEL_DB_URL:jdbc:oracle:thin:@//192.168.4.25:1521/ORCL}
    username: ${MEDKERNEL_DB_USERNAME:MEDKERNEL}
    password: ${MEDKERNEL_DB_PASSWORD:}
    # PR-FINAL-15: HikariCP 连接池配置（替代 29 处散落的旧式 JDBC 直连）。
    # EngineDataSourceConfig 读这里的配置构造 @Bean DataSource，所有 PersistenceService
    # 通过注入 DataSource 拿连接，@Transactional 真正生效（同 Service 内多 DAO 走同 connection）。
    hikari:
      # 单实例最大并发连接数（医院专网 8 核机器经验值）
      maximum-pool-size: ${MEDKERNEL_DB_POOL_MAX:20}
      # 长连接保活下限，避免冷启
      minimum-idle: ${MEDKERNEL_DB_POOL_MIN_IDLE:2}
      # 拿不到连接 3s 抛异常，避免请求堆积
      connection-timeout-ms: ${MEDKERNEL_DB_POOL_TIMEOUT:3000}
      # 10 分钟未用回收
      idle-timeout-ms: ${MEDKERNEL_DB_POOL_IDLE_TIMEOUT:600000}
      # 30 分钟强制重连，避开 DBA 端断连
      max-lifetime-ms: ${MEDKERNEL_DB_POOL_MAX_LIFETIME:1800000}
      # 拿连接 > 2s 未释放打 WARN（排查泄漏）
      leak-detection-threshold-ms: ${MEDKERNEL_DB_POOL_LEAK:2000}
      pool-name: MedKernelHikari
  security:
    # 不允许在 default 配置中保留 JWT 密钥；生产/UAT/dev 全部走环境变量 MEDKERNEL_JWT_SECRET。
    # 单元测试 / MockMvc 用 application-test.yml 中的测试密钥（profile: test）。
    # 直接 mvn spring-boot:run 若未设置环境变量，JwtTokenProvider.init 会拒绝启动。
    jwt-secret: ${MEDKERNEL_JWT_SECRET:}
    lock-threshold: ${MEDKERNEL_LOCK_THRESHOLD:5}
    lock-duration-minutes: ${MEDKERNEL_LOCK_DURATION:30}
  dify:
    # ADR-0013：去 Dify 化策略。默认禁用，仅 WORKFLOW 调用类型走 Dify。
    enabled: ${MEDKERNEL_DIFY_ENABLED:false}
    base-url: ${MEDKERNEL_DIFY_BASE_URL:}
    api-key: ${MEDKERNEL_DIFY_API_KEY:}
    timeout-ms: ${MEDKERNEL_DIFY_TIMEOUT_MS:3000}
    user: ${MEDKERNEL_DIFY_USER:medkernel-mvp}
  model-gateway:
    # 详见 ADR-0013（去 Dify 化 / 直连国产大模型 / Ollama 本地化）。
    enabled: true
    default-timeout-ms: 8000
    max-retry-count: 1
    # 降级链：按调用类型配置 Provider 顺序。Provider 未配置 apiKey 或 NOT_READY 时自动跳过。
    degradation-chains:
      RESEARCH: "QIANWEN,DEEPSEEK,OLLAMA_LOCAL,LOCAL"
      EXTRACT: "DEEPSEEK,QIANWEN,OLLAMA_LOCAL,LOCAL"
      EMBEDDING: "QIANWEN,LOCAL"
      RERANK: "LOCAL"
      CRITIC: "DEEPSEEK,QIANWEN,LOCAL"
      WORKFLOW: "DIFY,LOCAL"
    # 多 Provider 配置 — 启动时 LlmProviderFactory 为每项创建一个 ModelProvider。
    # 所有 apiKey 必须通过环境变量注入（不变量 A7：禁止 application.yml 明文写）。
    providers:
      QIANWEN:
        type: openai-compatible
        base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
        api-key: ${QIANWEN_API_KEY:}
        model: ${QIANWEN_MODEL:qwen-plus}
        timeout-ms: 8000
        max-tokens: 2000
        temperature: 0.3
        enabled: ${QIANWEN_ENABLED:false}
      DEEPSEEK:
        type: openai-compatible
        base-url: https://api.deepseek.com/v1
        api-key: ${DEEPSEEK_API_KEY:}
        model: ${DEEPSEEK_MODEL:deepseek-chat}
        timeout-ms: 8000
        max-tokens: 2000
        temperature: 0.3
        enabled: ${DEEPSEEK_ENABLED:false}
      KIMI:
        type: openai-compatible
        base-url: https://api.moonshot.cn/v1
        api-key: ${KIMI_API_KEY:}
        model: ${KIMI_MODEL:moonshot-v1-32k}
        timeout-ms: 10000
        max-tokens: 4000
        temperature: 0.3
        enabled: ${KIMI_ENABLED:false}
      ZHIPU:
        type: openai-compatible
        base-url: https://open.bigmodel.cn/api/paas/v4
        api-key: ${ZHIPU_API_KEY:}
        model: ${ZHIPU_MODEL:glm-4-plus}
        timeout-ms: 8000
        max-tokens: 2000
        temperature: 0.3
        enabled: ${ZHIPU_ENABLED:false}
      DOUBAO:
        type: openai-compatible
        base-url: https://ark.cn-beijing.volces.com/api/v3
        api-key: ${DOUBAO_API_KEY:}
        model: ${DOUBAO_MODEL:doubao-1.5-pro-32k}
        timeout-ms: 8000
        max-tokens: 2000
        temperature: 0.3
        enabled: ${DOUBAO_ENABLED:false}
      OLLAMA_LOCAL:
        type: ollama
        base-url: ${OLLAMA_BASE_URL:http://localhost:11434/v1}
        api-key: ""    # Ollama 本地无鉴权
        model: ${OLLAMA_MODEL:qwen2:7b}
        timeout-ms: 30000    # 本地推理慢
        max-tokens: 2000
        temperature: 0.3
        enabled: ${OLLAMA_ENABLED:false}
  graph:
    enabled: ${MEDKERNEL_GRAPH_ENABLED:false}
    uri: ${MEDKERNEL_GRAPH_URI:bolt://localhost:7687}
    username: ${MEDKERNEL_GRAPH_USERNAME:neo4j}
    password: ${MEDKERNEL_GRAPH_PASSWORD:}
    database: ${MEDKERNEL_GRAPH_DATABASE:neo4j}
    timeout-ms: ${MEDKERNEL_GRAPH_TIMEOUT_MS:3000}
    default-version: ${MEDKERNEL_GRAPH_DEFAULT_VERSION:AMI_GRAPH_2026_01}

# PR-FINAL-20: springdoc-openapi Swagger UI 配置。
# 安全约束：/api-docs UI 仅在 management port（18081，仅 127.0.0.1 监听）可访问，
# 业务端口 18080 通过 Nginx 屏蔽该路径，生产部署不暴露给公网。
springdoc:
  swagger-ui:
    path: /api-docs
    operationsSorter: alpha
    tagsSorter: alpha
    displayRequestDuration: true
    filter: true
  api-docs:
    path: /v3/api-docs
  packages-to-scan: com.medkernel
  paths-to-match: /api/**
